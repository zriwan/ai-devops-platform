services:
  app:
    image: ${DOCKERHUB_USERNAME}/ai-devops-platform:${IMAGE_TAG}
    container_name: ai-devops-container
    environment:
      APP_ENV: production
    expose:
      - "5000"
    restart: unless-stopped
    networks:
      - ai-devops-network

  nginx:
    image: nginx:alpine
    container_name: ai-devops-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - ai-devops-network

  prometheus:
    image: prom/prometheus:latest
    container_name: ai-devops-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - ai-devops-network

  grafana:
    image: grafana/grafana:latest
    container_name: ai-devops-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - ai-devops-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: ai-devops-node-exporter
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    pid: host
    restart: unless-stopped
    networks:
      - ai-devops-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: ai-devops-cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    restart: unless-stopped
    networks:
      - ai-devops-network

networks:
  ai-devops-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
