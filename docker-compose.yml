services:
  app:
    image: ${DOCKERHUB_USERNAME}/ai-devops-platform:${IMAGE_TAG}
    container_name: ai-devops-container
    environment:
      APP_ENV: production
    expose:
      - "5000"
    restart: unless-stopped
    networks:
      - ai-devops-network

  nginx:
    image: nginx:alpine
    container_name: ai-devops-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - ai-devops-network

networks:
  ai-devops-network:
    driver: bridge
