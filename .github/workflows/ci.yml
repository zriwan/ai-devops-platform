name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ai-devops-platform:latest .

      - name: Push Docker Image
        run: |
          set +e
          push_output=$(docker push ${{ secrets.DOCKERHUB_USERNAME }}/ai-devops-platform:latest 2>&1)
          push_status=$?
          set -e
          echo "$push_output"
          if [ "$push_status" -ne 0 ]; then
            if echo "$push_output" | grep -qi "insufficient scopes"; then
              echo "::warning::Skipping Docker image push because DOCKERHUB_TOKEN does not have write scope."
              exit 0
            fi
            exit "$push_status"
          fi
