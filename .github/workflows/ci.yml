name: CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest

      - name: Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        if: github.event_name == 'push'
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ai-devops-platform:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ai-devops-platform:${{ github.sha }} \
            .

      - name: Push Docker Image
        if: github.event_name == 'push'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ai-devops-platform:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ai-devops-platform:${{ github.sha }}

      - name: Configure SSH
        if: github.event_name == 'push'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

                  - name: Copy deployment files to EC2
        if: github.event_name == 'push'
        run: |
          ssh -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}" \
            "mkdir -p ~/ai-devops-platform/nginx"

          scp -i ~/.ssh/ec2_key \
            docker-compose.yml \
            "${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/ai-devops-platform/docker-compose.yml"

          scp -i ~/.ssh/ec2_key \
            nginx/default.conf \
            "${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/ai-devops-platform/nginx/default.conf"

      - name: Deploy with Docker Compose
        if: github.event_name == 'push'
        run: |
          ssh -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}" << 'EOF'

            set -e

            cd ~/ai-devops-platform

            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            export IMAGE_TAG="${{ github.sha }}"

            docker compose pull
            docker compose down
            docker compose up -d

            echo "Waiting for services..."
            sleep 10

            curl --fail --retry 5 --retry-delay 3 \
              http://127.0.0.1/health

            echo "Nginx production deployment successful."
          EOF
